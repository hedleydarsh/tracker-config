name: Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libxcb-cursor0 libgl1 libegl1 \
            libxkbcommon-x11-0 libdbus-1-3

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Build
        run: python3 build.py
        env:
          DISPLAY: ":99"

      - name: Package
        run: |
          cd dist
          tar -czf tracker-config-linux-x86_64.tar.gz tracker-config/ tracker-config.sh

      - uses: actions/upload-artifact@v4
        with:
          name: tracker-config-linux
          path: dist/tracker-config-linux-x86_64.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build
        run: python build.py

      - name: Package
        run: |
          cd dist
          Compress-Archive -Path tracker-config -DestinationPath tracker-config-windows-x86_64.zip
        shell: pwsh

      - uses: actions/upload-artifact@v4
        with:
          name: tracker-config-windows
          path: dist/tracker-config-windows-x86_64.zip

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            tracker-config-linux/tracker-config-linux-x86_64.tar.gz
            tracker-config-windows/tracker-config-windows-x86_64.zip
